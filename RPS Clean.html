<!DOCTYPE html>
<html>
<head>
  <title>Rock, Paper, Scissors Real 2</title>
  <meta charset = "UTF-8"/>
</head>
<body>
  <script>

    function getRandomInt(min, max) {
      min = Math.ceil(min);
      max = Math.floor(max);
      return Math.floor(Math.random() * (max - min) + min); //The maximum is exclusive and the minimum is inclusive
    }

    function computerPlay() {
      let randomNumber = getRandomInt(1,4);
      if (randomNumber == 3) { 
      return "Rock" }
        else if (randomNumber == 2) {
        return "Paper" }
          else if (randomNumber == 1) {
          return "Scissors"
          }
    }

    let win = 0;
    let lose = 0;

    function playRound(player, computer) {

      if ((player == "Rock" && computer == "Scissors") ||
      (player == "Scissors") && (computer == "Paper") ||
      (player == "Paper" && computer == "Rock")) {
      ++win;
      return ("You Win! " + player+ " beats " + computer + ".");

      } else if ((player == "Scissors" && computer == "Rock") || 
        (player == "Paper" && computer == "Scissors") ||
        (player == "Rock" && computer == "Paper")) { 
        ++lose;
        return ("You Lose! " + computer + " beats " + player + ".");
          } else return ("It's a tie! You picked " + player + " and the computer picked " + computer + ".");
    }

    function game(player) {
      for (let i = 0; i < 5; i++)  {
        playRound(player, computerPlay());
      }
      if (win > lose) {
        return "You won " + win + " times!";
      }   
      else if (lose > win) {
        return "You lost " + lose + " times!";
      }
        else return "It's a tie!"
      }  
    

      //console.log(playRound("Rock", computerPlay()));
      console.log(game(prompt("Rock, Paper, or Scissors?")));
  </script>
</body>
</html>
